<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fm-usb-mpx-tuner — Schéma interactif</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --panel: #13132a;
      --border: #1e1e3a;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #6b7a99;
      --wire-mpx:   #f7b731;
      --wire-i2s:   #45aaf2;
      --wire-i2c:   #a29bfe;
      --wire-usb:   #fd9644;
      --wire-pwr:   #26de81;
      --wire-audio: #4ecdc4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    header {
      background: var(--panel);
      border-bottom: 2px solid var(--accent);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    header p  { font-size: 0.8rem; color: var(--muted); }

    .legend {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.75rem;
    }
    .leg { display: flex; align-items: center; gap: 6px; }
    .leg-line { width: 24px; height: 3px; border-radius: 2px; }

    .wrap { padding: 20px; overflow: auto; }
    svg { display: block; margin: 0 auto; max-width: 100%; }

    /* Tooltip */
    .tip {
      position: fixed; pointer-events: none; opacity: 0; transition: opacity .15s;
      background: var(--panel); border: 1px solid var(--accent); border-radius: 8px;
      padding: 12px 16px; max-width: 300px; z-index: 100; font-size: 0.8rem; line-height: 1.6;
    }
    .tip.show { opacity: 1; }
    .tip h3 { color: var(--accent); font-size: 0.88rem; margin-bottom: 4px; }
    .tip .mpn { font-family: monospace; color: var(--wire-i2s); font-size: 0.75rem; margin-top: 4px; }
    .tip p { color: var(--muted); }

    /* Blocks */
    .blk { cursor: pointer; }
    .blk:hover { filter: drop-shadow(0 0 10px rgba(233,69,96,.5)); }
    .blk rect, .blk path { transition: filter .15s; }

    /* USB badge */
    .usb-iface { font-family: monospace; font-size: 8.5px; }
  </style>
</head>
<body>
<header>
  <h1>fm-usb-mpx-tuner</h1>
  <p>Schéma de principe v2.0 — USB composite : CDC + Audio×2 — survolez les blocs</p>
</header>
<div class="legend">
  <div class="leg"><div class="leg-line" style="background:var(--wire-mpx)"></div>MPX composite</div>
  <div class="leg"><div class="leg-line" style="background:var(--wire-i2s)"></div>I²S audio</div>
  <div class="leg"><div class="leg-line" style="background:var(--wire-i2c)"></div>I²C contrôle</div>
  <div class="leg"><div class="leg-line" style="background:var(--wire-usb)"></div>USB 2.0 FS</div>
  <div class="leg"><div class="leg-line" style="background:var(--wire-pwr)"></div>Alimentation 3,3 V</div>
  <div class="leg"><div class="leg-line" style="background:var(--wire-audio)"></div>Audio analogique</div>
</div>
<div class="wrap">
<svg viewBox="0 0 980 560" width="980" height="560" xmlns="http://www.w3.org/2000/svg">

    <path d="M0,0 L6,3 L0,6 Z" fill="#f7b731"/>
  </marker>

  <marker id="arr-usb" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#fd9644"/>

  <marker id="arr-audio" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">

<rect width="980" height="560" fill="url(#grid)"/>

<!-- ═══════════════════════════════════════════════════════════════
     TEF6687
════════════════════════════════════════════════════════════════ -->
<g class="blk"
   data-n="TEF6687HN/V205"
   data-d="Tuner FM/AM NXP à conversion directe. Intègre LNA, mélangeur, filtre IF, démodulateur FM. Sorties : MPX composite analogique (~300 mVrms), I²S audio 48 kHz/32 bit stéréo, métriques RF et groupes RDS via I²C. Référence clock externe 55,46667 MHz obligatoire."
   data-m="U1 — TEF6687HN/V205 QFN-32">
  <rect x="148" y="160" width="134" height="190" rx="8" fill="#0f1e2e" stroke="#45aaf2" stroke-width="2"/>
  <text x="215" y="183" text-anchor="middle" fill="#45aaf2" font-size="13" font-weight="700">TEF6687</text>
  <text x="215" y="198" text-anchor="middle" fill="#a29bfe" font-size="9">HN/V205</text>
  <line x1="158" y1="208" x2="272" y2="208" stroke="#1e2e4e" stroke-width="1"/>
  <text x="215" y="222" text-anchor="middle" fill="#6b7a99" font-size="8">FM 65–108 MHz</text>
  <text x="215" y="236" text-anchor="middle" fill="#6b7a99" font-size="8">Sens. −107 dBm</text>
  <text x="215" y="250" text-anchor="middle" fill="#6b7a99" font-size="8">MPX ~300 mVrms</text>
  <text x="215" y="264" text-anchor="middle" fill="#6b7a99" font-size="8">I²S 48kHz / 32bit</text>
  <text x="215" y="278" text-anchor="middle" fill="#6b7a99" font-size="8">RDS groupes natif</text>
  <text x="215" y="292" text-anchor="middle" fill="#6b7a99" font-size="8">I²C addr 0x61</text>
  <text x="215" y="336" text-anchor="middle" fill="#45aaf2" font-size="8">U1</text>
  <!-- crystal ref -->
  <text x="215" y="318" text-anchor="middle" fill="#26de81" font-size="7">↑ 55.46667 MHz</text>
  <text x="215" y="306" text-anchor="middle" fill="#26de81" font-size="7">X2 (crystal RF)</text>
</g>

     Crystal 55.46667 MHz
════════════════════════════════════════════════════════════════ -->

  <text x="215" y="376" text-anchor="middle" fill="#26de81" font-size="9" font-weight="600">55.46667 MHz</text>
  <text x="215" y="390" text-anchor="middle" fill="#6b7a99" font-size="7">Crystal TEF6687 — X2</text>
</g>

<!-- ═══════════════════════════════════════════════════════════════
     TLV9062 — MPX buffer
════════════════════════════════════════════════════════════════ -->
<g class="blk"
   data-n="TLV9062 — Buffer MPX"
   data-d="Op-amp rail-to-rail, GBW 10 MHz. Monté en buffer unitaire (gain = 1). Adapte l'impédance de sortie du TEF6687 (~600 Ω) pour attaquer l'entrée du PCM1863. Couplage AC 10 µF (C17) pour éliminer l'offset DC. Résistance série 100 Ω (R7) en sortie."

  <text x="377" y="264" text-anchor="middle" fill="#6b7a99" font-size="8">Buffer unitaire</text>
  <text x="377" y="276" text-anchor="middle" fill="#6b7a99" font-size="7">AC 10µF + 100Ω série</text>
  <text x="377" y="287" text-anchor="middle" fill="#f7b731" font-size="7">U4</text>
</g>

════════════════════════════════════════════════════════════════ -->

   data-n="PCM1863 — ADC MPX 192 kHz"
   data-d="ADC stéréo 24-bit 192 kHz Texas Instruments (même puce que HiFiBerry DAC+ ADC). Numérise le signal MPX composite. PGA interne −12/+40 dB. Interface I²S vers STM32 SPI2. Alimentation analogique séparée (TPS7A2033) pour préserver le SNR 103 dB."

  <text x="519" y="279" text-anchor="middle" fill="#6b7a99" font-size="8">192 kHz / SNR 103dB</text>

<g class="blk"
   data-n="STM32F072CBU6"
   data-d="MCU ARM Cortex-M0 48 MHz, 128 KB Flash, 16 KB RAM. USB Full-Speed natif via HSI48 + CRS (pas de crystal USB). Gère 2 bus I²S simultanés via SPI1 (TEF6687 48kHz, esclave) et SPI2 (PCM1863 192kHz, maître). Expose un périphérique USB composite : CDC + 2× Audio Class. DMA sur tous les transferts I²S."

  <rect x="620" y="150" width="160" height="220" rx="8" fill="#1e0f2e" stroke="#a29bfe" stroke-width="2"/>
  <text x="700" y="173" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="700">STM32F072</text>
  <text x="700" y="188" text-anchor="middle" fill="#fd9644" font-size="9">CBU6 — QFN-48</text>
  <line x1="630" y1="198" x2="770" y2="198" stroke="#2e1e4e" stroke-width="1"/>
  <text x="700" y="212" text-anchor="middle" fill="#6b7a99" font-size="8">Cortex-M0 @ 48 MHz</text>
  <text x="700" y="226" text-anchor="middle" fill="#6b7a99" font-size="8">USB FS HSI48+CRS</text>
  <text x="700" y="240" text-anchor="middle" fill="#6b7a99" font-size="8">SPI1: I²S slave 48kHz</text>
  <text x="700" y="254" text-anchor="middle" fill="#6b7a99" font-size="8">SPI2: I²S master 192kHz</text>
  <text x="700" y="268" text-anchor="middle" fill="#6b7a99" font-size="8">I²C1: TEF6687 ctrl</text>
  <text x="700" y="282" text-anchor="middle" fill="#6b7a99" font-size="8">DMA CH1–CH4</text>
  <text x="700" y="354" text-anchor="middle" fill="#a29bfe" font-size="8">U2</text>
</g>

   data-d="DAC I²S stéréo 32-bit Texas Instruments. SNR 112 dB, THD+N −93 dB. Mode hardware (broches FMT, DEMP, XSMT). Reçoit le même flux 48 kHz que USB hw:Tuner. Sortie 2,1 Vrms sur mini jack 3,5 mm TRS (J3). Alimentation analogique filtrée (TPS7A2033)."

<!-- ═══════════════════════════════════════════════════════════════
     POWER SECTION
════════════════════════════════════════════════════════════════ -->

<div class="tip" id="tip"></div>

<script>
const tip = document.getElementById('tip');
document.querySelectorAll('.blk').forEach(el => {
  el.addEventListener('mouseenter', () => {
    tip.innerHTML = `<h3>${el.dataset.n}</h3><p>${el.dataset.d}</p>${el.dataset.m ? `<div class="mpn">${el.dataset.m}</div>` : ''}`;
    tip.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    let x = e.clientX + 16, y = e.clientY + 16;
    if (x + 310 > innerWidth)  x = e.clientX - 320;
    if (y + 160 > innerHeight) y = e.clientY - 170;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });
  el.addEventListener('mouseleave', () => tip.classList.remove('show'));
});
</script>
